<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Travel Itinerary PDF Generator</title>

  <link rel="stylesheet" href="style.css" />

  <!-- jsPDF -->
  <script defer src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>

  <script defer src="script.js"></script>
</head>
<body>

<header class="wrap">
  <h1>Travel Itinerary Generator</h1>
  <p class="sub">Professional 2-Page Itinerary PDF</p>
</header>

<main class="wrap grid">

  <section class="card">

    <h2>Carrier Information</h2>
    <label>
      Carrier / Airline (text only)
      <input id="carrier" placeholder="e.g., Thai Airways">
    </label>

    <hr>

    <h2>Passengers (max 5)</h2>
    <div id="passengerBox"></div>
    <button type="button" id="addPassengerBtn">+ Add Passenger</button>

    <hr>

    <h2>Trip Segments (Multi-City)</h2>
    <div id="segmentBox"></div>
    <button type="button" id="addSegmentBtn">+ Add Segment</button>

    <hr>

    <h2>Trip Summary</h2>

    <div class="row">
      <label>
        Cabin
        <select id="cabin">
          <option>Economy</option>
          <option>Premium Economy</option>
          <option>Business</option>
          <option>First</option>
        </select>
      </label>

      <label>
        Baggage
        <input id="baggage" placeholder="30kg">
      </label>
    </div>

    <label>
      Notes
      <input id="notes" placeholder="Optional notes...">
    </label>

    <button id="generateBtn" class="primary">
      Generate 2-Page PDF
    </button>

  </section>

</main>

</body>
</html>
